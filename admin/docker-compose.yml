name: svnet-admin

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-svnet_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-svnet_admin}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-svnet_admin} -d ${POSTGRES_DB:-svnet_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ${SVNET_ADMIN_ENV_FILE:-./.env.example}
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgres://svnet_admin:CHANGE_POSTGRES_PASSWORD@postgres:5432/svnet_admin}
    volumes:
      - ${SVNET_BASE_DIR:-/opt/svobodanet}:${SVNET_BASE_DIR:-/opt/svobodanet}:rw
      - ${SVNET_CLI:-/usr/local/bin/svnet}:${SVNET_CLI:-/usr/local/bin/svnet}:ro
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-/api}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-/api}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
